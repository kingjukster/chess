name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

env:
  BUILD_TYPE: Release

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Generate Release Notes
      id: release_notes
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        
        # Get previous tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        echo "# Chess Engine $VERSION" > release_notes.md
        echo "" >> release_notes.md
        
        if [ -n "$PREV_TAG" ]; then
          echo "## Changes since $PREV_TAG" >> release_notes.md
          echo "" >> release_notes.md
          
          # Group commits by type
          echo "### Features" >> release_notes.md
          git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="feat:" >> release_notes.md || echo "- No new features" >> release_notes.md
          echo "" >> release_notes.md
          
          echo "### Bug Fixes" >> release_notes.md
          git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="fix:" >> release_notes.md || echo "- No bug fixes" >> release_notes.md
          echo "" >> release_notes.md
          
          echo "### Performance" >> release_notes.md
          git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --grep="perf:" >> release_notes.md || echo "- No performance improvements" >> release_notes.md
          echo "" >> release_notes.md
          
          echo "### Other Changes" >> release_notes.md
          git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --invert-grep --grep="feat:" --grep="fix:" --grep="perf:" >> release_notes.md || true
        else
          echo "Initial release" >> release_notes.md
        fi
        
        echo "" >> release_notes.md
        echo "## Downloads" >> release_notes.md
        echo "" >> release_notes.md
        echo "Download the appropriate binary for your platform below." >> release_notes.md
        echo "" >> release_notes.md
        echo "### Supported Platforms" >> release_notes.md
        echo "- **Linux** (x86_64)" >> release_notes.md
        echo "- **Windows** (x86_64)" >> release_notes.md
        echo "- **macOS** (x86_64, ARM64)" >> release_notes.md
        echo "" >> release_notes.md
        echo "## Usage" >> release_notes.md
        echo "" >> release_notes.md
        echo "The engine supports the UCI protocol. Connect it to any UCI-compatible chess GUI." >> release_notes.md

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Chess Engine ${{ steps.get_version.outputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: create-release

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja
        cmake --build build --parallel
        strip build/chess_engine

    - name: Package
      run: |
        mkdir -p release
        cp build/chess_engine release/
        cp README.md release/
        cd release
        tar -czf chess_engine-linux-x86_64.tar.gz chess_engine README.md

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.create-release.outputs.version }}
        files: release/chess_engine-linux-x86_64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: create-release

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release --parallel

    - name: Package
      run: |
        mkdir release
        copy build\Release\chess_engine.exe release\
        copy README.md release\
        cd release
        7z a chess_engine-windows-x86_64.zip chess_engine.exe README.md

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.create-release.outputs.version }}
        files: release/chess_engine-windows-x86_64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: create-release

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install cmake ninja

    - name: Build (x86_64)
      run: |
        cmake -B build-x86_64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES=x86_64 \
          -G Ninja
        cmake --build build-x86_64 --parallel
        strip build-x86_64/chess_engine

    - name: Build (ARM64)
      run: |
        cmake -B build-arm64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -G Ninja
        cmake --build build-arm64 --parallel
        strip build-arm64/chess_engine

    - name: Create Universal Binary
      run: |
        lipo -create \
          build-x86_64/chess_engine \
          build-arm64/chess_engine \
          -output chess_engine

    - name: Package
      run: |
        mkdir -p release
        cp chess_engine release/
        cp README.md release/
        cd release
        tar -czf chess_engine-macos-universal.tar.gz chess_engine README.md

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.create-release.outputs.version }}
        files: release/chess_engine-macos-universal.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [create-release, build-linux, build-windows, build-macos]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Announce Release
      run: |
        echo "✅ Release ${{ needs.create-release.outputs.version }} published successfully!"
        echo "Binaries available for Linux, Windows, and macOS"
